global:
  postgresHost: "pam-postgres"
  postgresPort: 5432
  namespace: "pam"
  secret:
    enabled: true
    name: keycloak-secrets
    postgresDb: "a2V5Y2xvYWtfZGI="
    postgresUser: "a2V5Y2xvYWtfZGJfdXNlcg=="
    postgresPassword: "c2VjdXJlQCNyb290"
    keycloakAdminPassword: "QWRtaW5AMTIzCg=="

postgres:
  image:
    repository: "docker.io/amitbbd/postgres"
    tag: "16.4"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 8Gi
  backup:
    persistence:
      size: 10Gi
    schedule: "0 2 * * *" # Daily at 2 AM
    retentionDays: 7
  databases:
    - keycloak
    - app_db

keycloak:
  enabled: true
  image:
    repository: "docker.io/amitbbd/keycloak"
    tag: "26.2.2"
    pullPolicy: IfNotPresent
  service:
    port: 8090
