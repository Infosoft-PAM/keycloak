apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  labels:
    app.kubernetes.io/name: keycloak
data:
  system-realm.json: |
    {
      "realm": "system",
      "enabled": true,
      "displayName": "System",
      "displayNameHtml": "<strong>System</strong>",
      "sslRequired": "external",
      "registrationAllowed": false,
      "registrationEmailAsUsername": false,
      "rememberMe": true,
      "verifyEmail": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "maxFailureWaitSeconds": 900,
      "minimumQuickLoginWaitSeconds": 60,
      "waitIncrementSeconds": 60,
      "quickLoginCheckMilliSeconds": 1000,
      "maxDeltaTimeSeconds": 43200,
      "failureFactor": 5,
      "attributes": {
        "userProfileEnabled": "true"
      },
      "requiredActions": [
        {
          "alias": "CONFIGURE_TOTP",
          "name": "Configure OTP",
          "providerId": "CONFIGURE_TOTP",
          "enabled": true,
          "defaultAction": false,
          "priority": 10,
          "config": {}
        },
        {
          "alias": "terms_and_conditions",
          "name": "Terms and Conditions",
          "providerId": "terms_and_conditions",
          "enabled": true,
          "defaultAction": true,
          "priority": 20,
          "config": {}
        },
        {
          "alias": "UPDATE_PASSWORD",
          "name": "Update Password",
          "providerId": "UPDATE_PASSWORD",
          "enabled": true,
          "defaultAction": true,
          "priority": 30,
          "config": {}
        },
        {
          "alias": "UPDATE_PROFILE",
          "name": "Update Profile",
          "providerId": "UPDATE_PROFILE",
          "enabled": true,
          "defaultAction": false,
          "priority": 40,
          "config": {}
        },
        {
          "alias": "VERIFY_EMAIL",
          "name": "Verify Email",
          "providerId": "VERIFY_EMAIL",
          "enabled": true,
          "defaultAction": true,
          "priority": 50,
          "config": {}
        }
      ],
      "passwordPolicy": "length(8) and upperCase(1) and lowerCase(1) and digits(1) and specialChars(1) and notUsername(undefined) and notEmail(undefined) and hashIterations(27500)",
      "roles": {
        "realm": [
          {
            "name": "superuser",
            "description": "Full system access and control",
            "composite": true,
            "composites": {
              "client": {
                "api-service": [
                  "USER_MGMT_WRITE",
                  "ROLE_MGMT_WRITE",
                  "VAULT_MGMT_WRITE",
                  "SECRET_MGMT_WRITE",
                  "POLICY_MGMT_WRITE",
                  "INTEGRATION_MGMT_WRITE",
                  "AUDIT_MGMT_WRITE",
                  "SYSTEM_MGMT_WRITE"
                ]
              }
            }
          },
          {
            "name": "security_administrator",
            "description": "Security, compliance and policy management",
            "composite": true,
            "composites": {
              "client": {
                "api-service": [
                  "USER_MGMT_READ",
                  "ROLE_MGMT_READ",
                  "VAULT_MGMT_READ",
                  "POLICY_MGMT_WRITE",
                  "INTEGRATION_MGMT_READ",
                  "AUDIT_MGMT_WRITE",
                  "SYSTEM_MGMT_READ"
                ]
              }
            }
          },
          {
            "name": "vault_admin",
            "description": "Manages vaults, secrets and user access",
            "composite": true,
            "composites": {
              "client": {
                "api-service": [
                  "USER_MGMT_WRITE",
                  "ROLE_MGMT_READ",
                  "VAULT_MGMT_WRITE",
                  "SECRET_MGMT_WRITE",
                  "INTEGRATION_MGMT_READ",
                  "AUDIT_MGMT_READ"
                ]
              }
            }
          },
          {
            "name": "user_manager",
            "description": "User lifecycle management",
            "composite": true,
            "composites": {
              "client": {
                "api-service": [
                  "USER_MGMT_WRITE",
                  "ROLE_MGMT_READ",
                  "VAULT_MGMT_READ"
                ]
              }
            }
          },
          {
            "name": "auditor",
            "description": "Read-only access for compliance and audit",
            "composite": true,
            "composites": {
              "client": {
                "api-service": [
                  "USER_MGMT_READ",
                  "ROLE_MGMT_READ",
                  "VAULT_MGMT_READ",
                  "SECRET_MGMT_READ",
                  "POLICY_MGMT_READ",
                  "INTEGRATION_MGMT_READ",
                  "AUDIT_MGMT_WRITE",
                  "SYSTEM_MGMT_READ"
                ]
              }
            }
          },
          {
            "name": "end_user",
            "description": "Standard user with basic access",
            "composite": true,
            "composites": {
              "client": {
                "api-service": [
                  "USER_MGMT_READ",
                  "SECRET_MGMT_READ",
                  "SECRET_MGMT_WRITE"
                ]
              }
            }
          }
        ],
        "client": {
          "api-service": [
            {
              "name": "USER_MGMT_WRITE",
              "description": "Create, update, delete, lock, unlock users",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "manage-users"
                  ]
                }
              }
            },
            {
              "name": "USER_MGMT_READ",
              "description": "View and search users",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "view-users",
                    "query-users"
                  ]
                }
              }
            },
            {
              "name": "ROLE_MGMT_WRITE",
              "description": "Create, update, delete realm roles",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "manage-clients"
                  ]
                }
              }
            },
            {
              "name": "ROLE_MGMT_READ",
              "description": "View and list realm roles",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "view-clients",
                    "query-clients"
                  ]
                }
              }
            },
            {
              "name": "VAULT_MGMT_WRITE",
              "description": "Create, update, delete folders/safes",
              "composite": false,
              "clientRole": true
            },
            {
              "name": "VAULT_MGMT_READ",
              "description": "View folders/safes",
              "composite": false,
              "clientRole": true
            },
            {
              "name": "SECRET_MGMT_WRITE",
              "description": "Manage accounts, retrieve passwords",
              "composite": false,
              "clientRole": true
            },
            {
              "name": "SECRET_MGMT_READ",
              "description": "View accounts and connect",
              "composite": false,
              "clientRole": true
            },
            {
              "name": "POLICY_MGMT_WRITE",
              "description": "Update password policy, session policy, token lifespan",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "manage-realm"
                  ]
                }
              }
            },
            {
              "name": "POLICY_MGMT_READ",
              "description": "View password policy and session settings",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "view-realm",
                    "query-realms"
                  ]
                }
              }
            },
            {
              "name": "INTEGRATION_MGMT_WRITE",
              "description": "Configure SAML, Entra ID, LDAP",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "manage-identity-providers"
                  ]
                }
              }
            },
            {
              "name": "INTEGRATION_MGMT_READ",
              "description": "View identity provider configurations",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "view-identity-providers"
                  ]
                }
              }
            },
            {
              "name": "AUDIT_MGMT_WRITE",
              "description": "View, export and manage audit logs",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "view-events",
                    "manage-events"
                  ]
                }
              }
            },
            {
              "name": "AUDIT_MGMT_READ",
              "description": "View audit logs and active sessions",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "view-events"
                  ]
                }
              }
            },
            {
              "name": "SYSTEM_MGMT_WRITE",
              "description": "Update system settings and perform backups",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "manage-realm"
                  ]
                }
              }
            },
            {
              "name": "SYSTEM_MGMT_READ",
              "description": "View system settings and configuration",
              "composite": true,
              "clientRole": true,
              "composites": {
                "client": {
                  "realm-management": [
                    "view-realm",
                    "query-realms"
                  ]
                }
              }
            }
          ]
        }
      },
      "users": [
        {
          "username": "admin",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Admin",
          "lastName": "System",
          "email": "",
          "credentials": [
            {
              "type": "password",
              "value": "Admin@123",
              "temporary": true
            }
          ],
          "requiredActions": [
            "UPDATE_PASSWORD"
          ],
          "realmRoles": [
            "superuser"
          ]
        },
        {
          "username": "debug",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Debug",
          "lastName": "Admin",
          "email": "debug@localhost",
          "credentials": [
            {
              "type": "password",
              "value": "Admin@123",
              "temporary": false
            }
          ],
          "clientRoles": {
            "realm-management": [
              "realm-admin"
            ]
          }
        }
      ],
      "clients": [
        {
          "clientId": "api-service",
          "name": "API Service",
          "description": "API Service",
          "enabled": true,
          "clientAuthenticatorType": "none",
          "redirectUris": [],
          "webOrigins": [],
          "standardFlowEnabled": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "publicClient": true,
          "protocol": "openid-connect",
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        }
      ],
      "browserFlow": "browser",
      "registrationFlow": "registration",
      "directGrantFlow": "direct grant",
      "resetCredentialsFlow": "reset credentials",
      "clientAuthenticationFlow": "clients",
      "dockerAuthenticationFlow": "docker auth"
    }
